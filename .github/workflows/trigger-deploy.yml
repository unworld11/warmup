name: Deploy to Trigger.dev (prod)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install

      - name: 🚀 Deploy Trigger.dev
        env:
          # A Trigger.dev Personal Access Token (tr_pat_...) from the account that
          # owns proj_civprxkuxybbsqefqfon. Add it as a repo Actions secret.
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        # Pinned to match @trigger.dev/sdk (4.5.4); the CLI and SDK versions must match.
        run: npx trigger.dev@4.5.4 deploy
